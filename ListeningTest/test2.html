<!DOCTYPE html>
<html>

<head>
  <title>Test Listening</title>
  <link rel="stylesheet" href="../libs/semantic.css">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f7fa;
      margin: 0;
      padding: 0 0 40px 0;
      text-align: center;
    }

    #containerLine {
      margin: 40px auto;
      border: 3px solid #5a4f4d;
      border-radius: 18px;
      background: #f9f7f6;
      box-shadow: 0 4px 24px rgba(90, 79, 77, 0.08), 0 1.5px 6px rgba(90, 79, 77, 0.10);
      width: 540px;
      max-width: 95vw;
      position: relative;
      padding: 0;
    }

    .init-container {
      margin: 24px auto;
      border: 3px dashed #b8a9a7;
      border-radius: 12px;
      background: #fffdfa;
      width: 500px;
      max-width: 90vw;
      position: relative;
      padding: 32px 24px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .init-container b {
      font-size: 1.5vw;
      margin-bottom: 32px;
      display: block;
      color: #5a4f4d;
    }

    #bookSelector {
      margin-bottom: 32px;
      font-size: 1.1vw;
      width: 80%;
      min-width: 180px;
      max-width: 320px;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #b8a9a7;
    }

    .init-container .area-label {
      font-weight: bold;
      font-size: 1.1vw;
      margin-bottom: 6px;
      display: block;
      color: #4b5437;
    }

    .init-container .radio-group {
      display: flex;
      gap: 18px;
      margin-top: 8px;
      justify-content: center;
      font-size: 2vh;
      margin-bottom: 18px;
    }

    #testCollectionBtn {
      font-size: 1.1vw;
      font-weight: bold;
      padding: 10px 28px;
      border-radius: 6px;
      background: #fdf4e2;
      border: 2px solid #b8a9a7;
      color: #5a4f4d;
      box-shadow: 0 2px 8px rgba(90, 79, 77, 0.06);
      transition: background 0.2s;
      margin-bottom: 10px;
    }

    #testCollectionBtn:hover {
      background: #ffe9c7;
      box-shadow: 0 4px 16px rgba(90, 79, 77, 0.10);
    }

    .ui.segment#wrongCountDiv {
      margin: 30px auto 10px auto;
      max-width: 600px;
      background: #fffdfa;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(90, 79, 77, 0.08), 0 1.5px 6px rgba(90, 79, 77, 0.10);
      font-size: 1.2em;
      font-weight: bold;
      color: #5a4f4d;
      text-align: center;
    }

    .quiz-container {
      margin: 30px auto 0 auto;
      max-width: 600px;
      background: #fffdfa;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(90, 79, 77, 0.06);
      padding: 32px 24px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #quizQuestion {
      font-size: 2.5vw;
      margin-bottom: 18px;
      color: #5a4f4d;
      font-weight: bold;
    }

    #speak {
      background: transparent;
      border: none;
      outline: none;
      font-size: 5vh;
      margin-bottom: 10px;
      cursor: pointer;
      color: #5a4f4d;
      transition: color 0.2s;
    }

    #speak:hover {
      color: #b8a9a7;
    }

    #revealWordsBtn {
      margin-top: 18px;
      font-size: 20px;
      font-weight: bold;
      padding: 8px 24px;
      border-radius: 6px;
      background: #fdf4e2;
      border: 2px solid #b8a9a7;
      color: #5a4f4d;
      box-shadow: 0 2px 8px rgba(90, 79, 77, 0.06);
      transition: background 0.2s;
    }

    #revealWordsBtn:hover {
      background: #ffe9c7;
      box-shadow: 0 4px 16px rgba(90, 79, 77, 0.10);
    }

    #revealedWords {
      margin-top: 18px;
      display: none;
      font-size: 1.2em;
      color: #4b5437;
      background: #f4f7fa;
      border-radius: 8px;
      padding: 8px 12px;
      width: 90%;
      word-break: break-word;
    }

    #enterWords {
      width: 90%;
      min-height: 80px;
      margin-top: 18px;
      font-size: 1.2em;
      border-radius: 8px;
      border: 1px solid #b8a9a7;
      padding: 8px;
      resize: vertical;
      box-sizing: border-box;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    #nextButton {
      margin: 32px auto 0 auto;
      font-size: 20px;
      font-weight: bold;
      border-radius: 8px;
      background: #fdf4e2;
      border: 2px solid #b8a9a7;
      color: #5a4f4d;
      box-shadow: 0 2px 8px rgba(90, 79, 77, 0.06);
      transition: background 0.2s;
      display: block;
    }

    #nextButton:hover {
      background: #ffe9c7;
      box-shadow: 0 4px 16px rgba(90, 79, 77, 0.10);
    }

    @media (max-width: 700px) {

      #containerLine,
      .init-container,
      .quiz-container {
        max-width: 98vw;
        min-width: 0;
      }

      #bookSelector {
        font-size: 3vw;
      }

      .init-container b {
        font-size: 3vw;
      }

      #quizQuestion {
        font-size: 5vw;
      }

      #revealWordsBtn,
      #testCollectionBtn,
      #nextButton {
        font-size: 3vw;
      }

      #enterWords {
        font-size: 3vw;
      }
    }
  </style>
</head>

<body>
  <div id="containerLine">
    <div class="init-container" id="initContainer">
      <b>
        Select the collection that you want to test.
      </b>
      <select class="ui search dropdown" id="bookSelector"></select>

      <!-- Area 1: Amount of words -->
      <label class="area-label">Select the amount of words you want to listen in one go:</label>
      <div class="radio-group">
        <label><input type="radio" name="wordAmount" value="3" checked> 3</label>
        <label><input type="radio" name="wordAmount" value="5"> 5</label>
        <label><input type="radio" name="wordAmount" value="10"> 10</label>
        <label><input type="radio" name="wordAmount" value="15"> 15</label>
      </div>

      <!-- Area 2: Speed -->
      <label class="area-label">Select speed:</label>
      <div class="radio-group">
        <label><input type="radio" name="playbackSpeed" value="0.8"> 0.8x</label>
        <label><input type="radio" name="playbackSpeed" value="1" checked> 1x</label>
        <label><input type="radio" name="playbackSpeed" value="1.5"> 1.5x</label>
        <label><input type="radio" name="playbackSpeed" value="2"> 2x</label>
      </div>

      <label class="area-label">Select coverage</label>
      <div style="margin-bottom: 5px;" class="checkbox-group">
        <label><input type="checkbox" name="coverage" value="all"> All</label>
        <label><input type="checkbox" name="coverage" value="learned" checked> Learned words</label>
        <label><input type="checkbox" name="coverage" value="focus" checked> Focused words</label>
        <label><input type="checkbox" name="coverage" value="freq"> Mistaken words</label>
      </div>

      <button class="ui button" id="testCollectionBtn">Test Collection</button>
    </div>
  </div>

  <div class="ui segment" id="wrongCountDiv"></div>
  <div class="quiz-container" id="quizContainer">
    <p id="quizQuestion"></p>
    <button class="ui button" id="speak">&#128266;</button>
    <button class="ui button" id="revealWordsBtn" style="margin-top: 18px;">Reveal Words</button>
    <p id="revealedWords"></p>
    <textarea id="enterWords" placeholder="Enter the words you heard here..."></textarea>
  </div>
  <button class="ui button" id="nextButton">Next</button>
  <script src="test2.js"></script>
</body>

</html>
