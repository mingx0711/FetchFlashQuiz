<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Flashcards</title>
  <link rel="stylesheet" href="../libs/semantic.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600&display=swap');

    :root {
      --bg-main: #fcfaf7;
      --accent-sage: #607059;
      --soft-red: #ffaba7;
      --text-dark: #272623;
      --text-soft: #7a786f;
      --card-bg: #ffffff;
      --option-hover: #f1ede8;
      --border-soft: #f0ede8;
      --success-bg: #e7f5e9;
      --success-text: #1b5e20;
      --error-bg: #fff1f1;
      --error-text: #c62828;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-dark);
      margin: 0;
      padding: 24px 20px 48px;
    }

    h1,
    h2,
    .brand,
    #wordDiv,
    #quizQuestion,
    #trueFalseQuestion {
      font-family: 'Lexend', sans-serif;
    }

    .page-shell {
      max-width: 920px;
      margin: 0 auto;
    }

    .hero-bar,
    .flashcard,
    .quiz-container,
    .true-false-container,
    #correctDefinition,
    .bottom-buttons,
    #donzo.ui.message {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    .hero-bar {
      max-width: 720px;
      margin: 0 auto 22px;
      border-radius: 24px;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 14px;
      border-radius: 999px;
      background: #f6f2ec;
      color: var(--accent-sage);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: -0.04em;
    }

    .hero-copy {
      color: var(--text-soft);
      font-size: 1rem;
      line-height: 1.6;
    }

    #wrongCountDiv.ui.segment {
      margin: 0;
      padding: 0;
      background: transparent;
      box-shadow: none;
      border: none;
    }

    .step-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      background: white;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-sage);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-soft);
    }

    #donzo.ui.message {
      display: none;
      max-width: 720px;
      margin: 0 auto 20px;
      border-radius: 24px;
      padding: 26px 28px;
      color: var(--success-text);
      background: #eef8ef;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
    }

    .flashcard {
      border-radius: 24px;
      padding: 36px 32px;
      max-width: 720px;
      margin: 0 auto 20px;
      text-align: center;
    }

    #wordDiv {
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: -0.03em;
      font-size: clamp(2.6rem, 6vw, 4.8rem);
      line-height: 1;
      margin-bottom: 0.75rem;
    }

    .ui.horizontal.divider {
      width: 82%;
      margin: 1.25rem auto !important;
      color: #d6d1ca;
    }

    #defDiv {
      color: var(--accent-sage);
      font-size: clamp(1.5rem, 3.6vw, 2.4rem);
      line-height: 1.35;
      margin-top: 0.75rem;
    }

    .quiz-container,
    .true-false-container {
      max-width: 720px;
      margin: 0 auto 20px;
      border-radius: 24px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
    }

    #quizQuestion,
    #trueFalseQuestion {
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      line-height: 1.25;
      margin: 0 0 8px;
      text-align: center;
      letter-spacing: -0.03em;
    }

    .quiz-option,
    .true-false-container .ui.button {
      width: 100% !important;
      margin: 0 !important;
      padding: 18px !important;
      border-radius: 14px !important;
      background: #ffffff !important;
      border: 2px solid var(--border-soft) !important;
      font-size: 1.05rem !important;
      font-weight: 600 !important;
      color: var(--text-dark) !important;
      transition: all 0.2s ease !important;
      text-align: left !important;
      box-shadow: none !important;
    }

    .quiz-option:hover,
    .true-false-container .ui.button:hover {
      border-color: var(--accent-sage) !important;
      background: var(--option-hover) !important;
      transform: translateX(4px);
    }

    .true-false-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    #trueButton.ui.button,
    #falseButton.ui.button {
      text-align: center !important;
      font-size: 1.15rem !important;
    }

    #trueButton.ui.button {
      background: var(--success-bg) !important;
      color: var(--success-text) !important;
    }

    #falseButton.ui.button {
      background: var(--error-bg) !important;
      color: var(--error-text) !important;
    }

    #counter {
      max-width: 720px;
      margin: 0 auto 14px;
      text-align: center;
      color: var(--text-soft);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #correctMessage,
    #incorrectMessage {
      display: none;
      border-radius: 16px;
      padding: 18px 20px;
      margin: 0 auto 14px;
      max-width: 540px;
      font-weight: 600;
      font-size: 1rem;
      text-align: center;
      border: none;
      box-shadow: none;
    }

    #correctMessage {
      color: var(--success-text);
      background: #eef8ef;
    }

    #incorrectMessage {
      color: var(--error-text);
      background: #fff0f0;
    }

    #correctDefinition {
      display: none;
      max-width: 540px;
      margin: 0 auto 18px;
      border-radius: 24px;
      padding: 24px 28px;
      min-height: 120px;
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.5;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .bottom-buttons {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .bottom-buttons .ui.button {
      min-width: 150px;
      border-radius: 16px !important;
      padding: 16px 24px !important;
      font-size: 1rem !important;
      font-weight: 700 !important;
      box-shadow: none !important;
      border: none !important;
    }

    #snoozeButton {
      background: #f1ede8 !important;
      color: var(--text-dark) !important;
    }

    #nextButton {
      background: var(--accent-sage) !important;
      color: white !important;
    }

    #nextAfterIncorrectButton {
      display: none;
      background: #272623 !important;
      color: white !important;
    }

    @media (max-width: 760px) {
      body {
        padding: 16px 12px 32px;
      }

      .hero-bar,
      .flashcard,
      .quiz-container,
      .true-false-container,
      #correctDefinition,
      .bottom-buttons,
      #donzo.ui.message {
        border-radius: 20px;
        padding-left: 18px;
        padding-right: 18px;
      }

      .true-false-actions {
        grid-template-columns: 1fr;
      }

      .bottom-buttons {
        flex-direction: column;
      }

      .bottom-buttons .ui.button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page-shell">
    <section class="hero-bar">
      <span class="eyebrow">Review Session</span>
      <h1>Test Flashcards</h1>
      <div class="hero-copy">Work through weak and focused vocabulary with the same calm study interface used on the learning page.</div>
      <div class="ui segment" id="wrongCountDiv">
        <span class="step-pill">0 / 0</span>
      </div>
    </section>

    <div id="donzo" class="ui message">
      Congrats, you have gone through all your weak vocabs
    </div>

    <div id="vocabFlashcard" class="flashcard">
      <div id="wordDiv"></div>
      <div class="ui horizontal divider"></div>
      <div id="defDiv"></div>
    </div>

    <div class="quiz-container" id="quizContainer">
      <p id="quizQuestion"></p>
      <button class="ui quiz-option" id="option1"></button>
      <button class="ui quiz-option" id="option2"></button>
      <button class="ui quiz-option" id="option3"></button>
      <button class="ui quiz-option" id="option4"></button>
    </div>

    <div class="true-false-container" id="trueFalseContainer">
      <p id="trueFalseQuestion"></p>
      <div class="true-false-actions">
        <button class="ui button" id="trueButton">True</button>
        <button class="ui button" id="falseButton">False</button>
      </div>
    </div>

    <p id="counter"></p>
    <p class="ui message" id="correctMessage">Correct!</p>
    <p class="ui message" id="incorrectMessage">Incorrect! The correct definition is:</p>
    <div id="correctDefinition" class="ui flashcard"></div>

    <div class="bottom-buttons">
      <button class="ui button" id="snoozeButton">Snooze</button>
      <button class="ui button" id="nextButton">Next</button>
      <button class="ui button" id="nextAfterIncorrectButton">Next</button>
    </div>
  </div>

  <script src="test.js"></script>
</body>

</html>
